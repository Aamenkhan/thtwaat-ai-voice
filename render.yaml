services:
  - type: web
    name: thtwaat-ai-voice
    runtime: python
    rootDir: ai_server/python_fastapi
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
