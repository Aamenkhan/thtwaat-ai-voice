<!DOCTYPE html>
<html>
<head>
<title>Thtwaat AI Studio</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
width:700px;
margin:auto;
margin-top:80px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
background:#22c55e;
border:none;
padding:15px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>Thtwaat AI Studio</h1>

<p>Create AI Video Automatically</p>

<textarea id="topic" placeholder="Enter video topic"></textarea>

<br>

<button onclick="generateVideo()">Generate AI Video</button>

<p id="status"></p>

</div>

<script>

async function generateVideo(){

let topic = document.getElementById("topic").value

document.getElementById("status").innerText="Generating video..."

let response = await fetch("/generate_full_video",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({topic:topic})
})

let data = await response.json()

document.getElementById("status").innerText=data.status

}

</script>

</body>
</html>
