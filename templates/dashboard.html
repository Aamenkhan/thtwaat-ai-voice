<!DOCTYPE html>
<html>
<head>

<title>Thtwaat AI Studio</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
width:100%;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Thtwaat AI Studio</h1>

<h2>1. Topic</h2>

<form action="/generate_script" method="post">
<input type="text" name="topic" placeholder="Enter topic">
<button type="submit">Generate Script</button>
</form>


<h2>2. Upload Voice Sample</h2>

<form action="/upload_voice" method="post" enctype="multipart/form-data">
<input type="file" name="file">
<button type="submit">Upload Voice</button>
</form>


<h2>3. Generate Voice</h2>

<form action="/generate_voice" method="post">
<button type="submit">Generate Voice</button>
</form>


<h2>4. Generate Images</h2>

<form action="/generate_images" method="post">
<button type="submit">Generate Images</button>
</form>


<h2>5. Generate Video</h2>

<form action="/generate_video" method="post">
<button type="submit">Generate Video</button>
</form>


<h2>6. Download Video</h2>

<a href="/download_video">
<button>Download Video</button>
</a>

</div>

</body>
</html>
